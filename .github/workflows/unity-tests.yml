name: Unity Tests & Coverage

on:
  push:
    branches: [ main, Mei0725-patch-1 ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Cache Library
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: src/Library
          key: Library-${{ runner.os }}-${{ hashFiles('src/Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-

      # 3. Run Unity Tests
      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: src
          unityVersion: 2022.3.15f1
          testMode: playmode
          artifactsPath: artifacts 
          coverageOptions: "generateHtmlReport;generateBadgeReport;combinedHtml"

      # 4. Upload results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: artifacts

      # 5. Summary
      - name: Test Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unity Test Results
          path: 'artifacts/*.xml'
          reporter: dotnet-nunit

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/CodeCoverage 
          publish_branch: gh-pages 
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'