name: Unity Tests & Coverage

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
  pull_request:
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Cache Library
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: src/Library
          key: Library-${{ runner.os }}-${{ hashFiles('src/Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-

      # 3. Run Unity Tests
      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: src
          unityVersion: 2022.3.15f1
          testMode: playmode
          artifactsPath: artifacts 
          useHostNetwork: true
          coverageOptions: "generateHtmlReport;generateBadgeReport;combinedHtml;pathFilters:-**/UnitTests/**,-**/TextMesh*Pro/**"
          customParameters: "-debugCodeOptimization -enableCodeCoverage"

      # 4. Summary
      - name: Test Summary
        if: always()
        run: |
          echo "### Unity Test Results" >> $GITHUB_STEP_SUMMARY
          
          if [ ! -f artifacts/playmode-results.xml ]; then
            echo "No test results found at artifacts/playmode-results.xml" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          TOTAL=$(grep -oP 'total="\K[^"]+' artifacts/playmode-results.xml | head -1)
          PASSED=$(grep -oP 'passed="\K[^"]+' artifacts/playmode-results.xml | head -1)
          FAILED=$(grep -oP 'failed="\K[^"]+' artifacts/playmode-results.xml | head -1)
          SKIPPED=$(grep -oP 'skipped="\K[^"]+' artifacts/playmode-results.xml | head -1)
          DURATION=$(grep -oP 'duration="\K[^"]+' artifacts/playmode-results.xml | head -1)

          echo "| Stat | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          
          if [ "$FAILED" -gt "0" ]; then
            echo " " >> $GITHUB_STEP_SUMMARY
            echo "> **Warning:** There are failing tests. Please download the 'Unity-Test-Report' artifact below to see details." >> $GITHUB_STEP_SUMMARY
          fi

      # - name: Debug - Find all HTML files
      #   if: always()
      #   run: |
      #     echo "Listing all files in the runner to find index.html..."
      #     find . -name "*.html"

      # 5. Prepare Artifact Path
      - name: Prepare Artifact Path
        if: always()
        run: |
          if [ -d "./CodeCoverage/Report" ]; then
            echo "Report found, ready for upload."
          else
            echo "Searching for index.html..."
            REPORT_SRC=$(find . -name "index.html" -exec dirname {} \; | head -n 1)
            if [ -n "$REPORT_SRC" ]; then
              mkdir -p ./final-report
              cp -r "$REPORT_SRC"/* ./final-report/
            fi
          fi

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unity-Test-Report
          path: |
            ./CodeCoverage/Report
            ./final-report
          retention-days: 14